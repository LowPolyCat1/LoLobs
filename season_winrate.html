<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="stats-card" class="overlay-card">
        <div class="stat-group">
            <div class="text-group">
                <div class="label-league">Season Record</div>
                <div class="value-league">
                    <span id="wins" class="win">0</span><span class="slash">/</span><span id="losses"
                        class="loss">0</span>
                </div>
            </div>
            <div class="text-group">
                <div class="label-league">Winrate</div>
                <div id="wr-value" class="value-league" style="color: var(--text-primary)">0%</div>
            </div>
        </div>
    </div>
    <script src="overlay.js"></script>
</body>

</html>
