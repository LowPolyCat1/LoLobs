<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: transparent;
            margin: 0;
            padding: 10px;
            font-family: sans-serif;
            color: white;
        }

        #session-card {
            display: flex;
            background: rgba(10, 10, 20, 0.9);
            border-left: 4px solid #00cfbc;
            padding: 12px 20px;
            width: fit-content;
            border-radius: 4px;
        }

        .stat-section {
            display: flex;
            flex-direction: column;
            margin-right: 20px;
        }

        .label {
            font-size: 0.7rem;
            color: #8890b0;
            text-transform: uppercase;
        }

        .value {
            font-size: 1.4rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="session-card">
        <div class="stat-section">
            <div class="label">Session</div>
            <div class="value"><span id="s-wins">0</span>W - <span id="s-losses">0</span>L</div>
        </div>
        <div class="stat-section">
            <div class="label">Winrate</div>
            <div id="s-wr" class="value">--%</div>
        </div>
    </div>

    <script>
        const socket = new WebSocket('ws://127.0.0.1:8080/ws');


        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.session) {
                const w = data.session.wins;
                const l = data.session.losses;
                const total = w + l;
                const wr = total > 0 ? ((w / total) * 100).toFixed(0) : "0";

                document.getElementById('s-wins').innerText = w;
                document.getElementById('s-losses').innerText = l;
                document.getElementById('s-wr').innerText = `${wr}%`;
            }
        };

    </script>
</body>

</html>
