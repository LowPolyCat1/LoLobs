<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="session-card" class="overlay-card">
        <div class="stat-group">
            <div class="text-group">
                <div class="label-league">Current Session</div>
                <div class="value-league">
                    <span id="s-wins" class="win">0</span><span class="slash">/</span><span id="s-losses"
                        class="loss">0</span>
                </div>
            </div>
            <div class="text-group">
                <div class="label-league">Session WR</div>
                <div id="s-wr" class="value-league" style="color: var(--text-primary)">0%</div>
            </div>
        </div>
    </div>
    <script src="overlay.js"></script>
</body>

</html>
